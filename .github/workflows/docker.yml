name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: Dockerfile.example
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Build alternative images
        run: |
          # Build and push for each agent variant
          for agent in anthropic google openai; do
            TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$agent:latest"
            echo "Building $TAG..."
            
            # Note: In production, you'd have agent-specific Dockerfiles
            # This is a placeholder showing the concept
          done

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker image
        run: |
          echo "Testing Docker image build..."
          # Verify Dockerfile syntax
          docker build --check -f Dockerfile.example .

  release:
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and retag for release
        run: |
          VERSION=${{ github.ref_name }}
          # Pull all semver tags and push with latest
          for tag in $VERSION ${VERSION#v} ${VERSION%.${VERSION##*.}}; do
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag || true
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag \
                       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          done

      - name: Update README Docker badge
        run: |
          VERSION=${{ github.ref_name }}
          SED_VERSION=$(echo $VERSION | sed 's/^v//')
          
          # Update Docker Hub badge in README
          sed -i "s|ghcr.io/neopilot-ai/acp.el:.*|ghcr.io/neopilot-ai/acp.el:${SED_VERSION}|g" README.md
          
          # Commit if changed
          if ! git diff --quiet README.md; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add README.md
            git commit -m "Update Docker image version in README"
            git push
          fi

  publish-gpr:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Verify package published
        run: |
          echo "Verifying GitHub Package Registry publication..."
          TOKEN=${{ secrets.GITHUB_TOKEN }}
          
          # Check package exists
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/acp/elversions" | \
            jq '.[0].name'
