name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emacs
        run: |
          # Install Emacs from apt
          sudo apt-get update
          sudo apt-get install -y emacs

      - name: Check Emacs version
        run: emacs --version

      - name: Load package
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            --eval "(progn (require 'acp) (message \"Load successful\"))"

      - name: Byte-compile check
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            --eval "(progn \
              (require 'cl-lib) \
              (require 'map) \
              (require 'json) \
              (require 'markdown-overlays nil t) \
              (require 'shell-maker nil t))" \
            --eval "(dolist (f (append \
              (directory-files \".\" nil \"\\.el$$\") \
              (directory-files \"agents\" nil \"\\.el$$\") \
              (directory-files \"ui\" nil \"\\.el$$\") \
              (directory-files \"features\" nil \"\\.el$$\"))) \
              (when (string-match \"\\.el$$\" f) (load-file f)))" \
            --eval "(byte-compile-file \"acp.el\")"

      - name: Run tests
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            -l tests/acp-fakes.el \
            -l tests/acp-tests.el \
            -l tests/acp-diff-tests.el \
            -l tests/acp-command-prefix-tests.el \
            -l tests/acp-anthropic-tests.el \
            -l tests/acp-openai-tests.el \
            -l tests/acp-devcontainer-tests.el \
            --eval "(ert-run-tests-batch-and-exit)"
