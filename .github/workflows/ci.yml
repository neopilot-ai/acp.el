name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['29.1', '29.2', '30.1']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emacs ${{ matrix.emacs-version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Check Emacs version
        run: emacs --version

      - name: Load package
        run: |
          emacs --batch -L . -L agents -L ui -L features \
          --eval "(progn
            (require 'cl-lib)
            (require 'map)
            (require 'json)
            (ignore-errors (require 'markdown-overlays))
            (ignore-errors (require 'shell-maker))
            (require 'acp)
            (message \"Load check completed\"))"

      - name: Byte-compile check
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            --eval "(progn
              (require 'cl-lib)
              (require 'map)
              (require 'json)
              (ignore-errors (require 'markdown-overlays))
              (ignore-errors (require 'shell-maker)))" \
            --eval "(dolist (f (append
              (directory-files \".\" nil \"\\\\.el\$\$\")
              (directory-files \"agents\" nil \"\\\\.el\$\$\")
              (directory-files \"ui\" nil \"\\\\.el\$\$\")
              (directory-files \"features\" nil \"\\\\.el\$\$\")
              (directory-files \"tests\" nil \"\\\\.el\$\$\")
              (directory-files \".\" nil \"acp-tests.el\")))
              (when (and (string-match \"\\\\.el\$\$\" f)
                         (not (string-match \"tests\" f))
                         (not (string-match \"-tests\" f)))
                (condition-case err
                    (progn (byte-compile-file f) (message \"OK: %s\" f))
                  (error (message \"WARN: %s - %s\" f (error-message-string err))))))"

      - name: Run standalone tests
        run: |
          emacs --batch -L . -L agents -L ui -L features -L tests \
            --eval "(progn
              (require 'ert)
              (require 'cl-lib)
              (require 'map)
              (require 'json)
              (ignore-errors (require 'markdown-overlays))
              (ignore-errors (require 'shell-maker)))" \
            --eval "(dolist (f (directory-files \"tests\" nil \"-tests\\\\.el\$\$\"))
                      (load (expand-file-name f \"tests\") nil t))" \
            --eval "(ert-run-tests-batch-and-exit)" 2>&1 || true

      - name: Run standalone tests (strict)
        run: |
          emacs --batch -L . -L agents -L ui -L features -L tests \
            --eval "(progn
              (require 'ert)
              (require 'cl-lib)
              (require 'map)
              (require 'json)
              (ignore-errors (require 'markdown-overlays))
              (ignore-errors (require 'shell-maker)))" \
            --eval "(dolist (f (directory-files \"tests\" nil \"-tests\\\\.el\$\$\"))
                      (load (expand-file-name f \"tests\") nil t))" \
            --eval "(let ((failures (ert-run-tests-batch-and-exit)))
                      (when (> failures 0) (kill-emacs 1)))"
