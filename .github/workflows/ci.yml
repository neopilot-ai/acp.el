name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emacs
        run: |
          # Install Emacs from apt
          sudo apt-get update
          sudo apt-get install -y emacs

      - name: Check Emacs version
        run: emacs --version

      - name: Load package
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            --eval "(progn \
              (require 'cl-lib) \
              (require 'map) \
              (require 'json) \
              (ignore-errors (require 'markdown-overlays)) \
              (ignore-errors (require 'shell-maker)) \
              (require 'acp) \
              (message \"Load check completed\"))"

      - name: Byte-compile check
        run: |
          emacs --batch -L . -L agents -L ui -L features \
            --eval "(progn \
              (require 'cl-lib) \
              (require 'map) \
              (require 'json) \
              (ignore-errors (require 'markdown-overlays)) \
              (ignore-errors (require 'shell-maker)))" \
            --eval "(dolist (f (append \
              (directory-files \".\" nil \"\\.el$$\") \
              (directory-files \"agents\" nil \"\\.el$$\") \
              (directory-files \"ui\" nil \"\\.el$$\") \
              (directory-files \"features\" nil \"\\.el$$\"))) \
              (when (string-match \"\\.el$$\" f) (load-file f)))" \
            --eval "(byte-compile-file \"acp.el\")"

      - name: Run tests
        run: |
          echo "Tests require shell-maker and markdown-overlays"
          echo "Install these dependencies to run tests:"
          echo "  - shell-maker (https://github.com/neopilot-aishell-maker/shell-maker)"
          echo "  - markdown-overlays"
          echo "Skipping tests in CI (dependencies not available)"
