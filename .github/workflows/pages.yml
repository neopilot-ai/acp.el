name: GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          for f in docs/*.html; do
            echo "Checking: $f"
            # Basic well-formedness check
            if ! grep -q '</html>' "$f"; then
              echo "ERROR: Missing closing </html> in $f"
              exit 1
            fi
          done
          echo "All HTML files validated"

      - name: Check required files
        run: |
          test -f docs/index.html || { echo "ERROR: docs/index.html missing"; exit 1; }
          test -f docs/style.css || { echo "ERROR: docs/style.css missing"; exit 1; }
          echo "Required files present"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
